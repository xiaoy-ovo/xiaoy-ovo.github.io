<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiaoy_ovo — 个人主页</title>
<style>
  /* ============ RESET & BASE ============ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    --glass-blur: blur(20px) saturate(180%);
    --text-primary: #f0f0f0;
    --text-secondary: #b0b0c0;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.45);
    --radius: 24px;
    --transition: 0.45s cubic-bezier(0.25, 0, 0, 1);
  }

  body {
    min-height: 100vh;
    background: #0a0a14;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
    color: var(--text-primary);
    display: flex; align-items: center; justify-content: center;
    overflow-x: hidden;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ ANIMATED BG BLOBS ============ */
  .bg-orbs {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .bg-orbs::before,
  .bg-orbs::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.48;
    animation: orbDrift 14s ease-in-out infinite alternate;
  }
  .bg-orbs::before {
    width: 620px; height: 620px;
    background: radial-gradient(circle, #7c5cfc 0%, transparent 70%);
    top: -15%; left: -10%;
    animation-delay: 0s;
  }
  .bg-orbs::after {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #38bdf8 0%, transparent 70%);
    bottom: -18%; right: -12%;
    animation-delay: -7s;
  }

  @keyframes orbDrift {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(60px, -40px) scale(1.12); }
    66%  { transform: translate(-30px, 50px) scale(0.92); }
    100% { transform: translate(20px, -20px) scale(1.05); }
  }

  /* ============ FLOATING PARTICLES ============ */
  .particles {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) scale(1);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(40px) scale(0); opacity: 0; }
  }

  /* ============ MAIN CARD ============ */
  .wrapper {
    position: relative; z-index: 1;
    width: min(720px, 94vw);
    display: flex; flex-direction: column; gap: 28px;
    padding: 20px 0 40px;
  }

  /* ---------- glass card mixin ---------- */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: var(--glass-shadow);
    transition: var(--transition);
  }

  /* ============ HEADER / AVATAR ============ */
  .hero {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 44px 32px 36px;
    animation: fadeInUp 0.9s ease both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 0deg, #7c5cfc, #38bdf8, #a78bfa, #7c5cfc);
    animation: ringSpin 6s linear infinite;
    box-shadow: 0 0 32px var(--accent-glow);
  }
  @keyframes ringSpin { to { transform: rotate(360deg); } }
  .avatar {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    color: #fff;
    font-weight: 700;
    letter-spacing: 1px;
    user-select: none;
  }

  .name {
    font-size: 36px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #7dd3fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.25); }
  }

  .tagline {
    font-size: 17px; color: var(--text-secondary);
    letter-spacing: 4px; font-weight: 400;
    opacity: 0.85;
  }

  .bio {
    margin-top: 4px;
    font-size: 15px; color: #9090a8;
    display: flex; align-items: center; gap: 6px;
  }
  .bio .cursor {
    display: inline-block; width: 2px; height: 18px;
    background: var(--accent);
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ============ WORKS SECTION ============ */
  .works {
    padding: 32px;
    animation: fadeInUp 0.9s ease 0.15s both;
    display: flex; flex-direction: column; gap: 20px;
  }
  .section-title {
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 6px; color: #707088;
    font-weight: 600;
  }

  .project-card {
    display: flex; align-items: center; gap: 20px;
    padding: 24px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: var(--transition);
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .project-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%),
                rgba(124, 92, 252, 0.12), transparent 50%);
    opacity: 0; transition: opacity 0.35s;
    pointer-events: none; z-index: 0;
  }
  .project-card:hover::before { opacity: 1; }
  .project-card:hover {
    border-color: rgba(255, 255, 255, 0.22);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 60px rgba(124, 92, 252, 0.15);
    transform: translateY(-3px);
  }

  .project-icon {
    flex-shrink: 0;
    width: 60px; height: 60px;
    border-radius: 18px;
    background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    position: relative; z-index: 1;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .project-info { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 6px; }
  .project-name {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #e2e8f0, #94a3b8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .project-desc { font-size: 14px; color: #808898; line-height: 1.6; }

  .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 99px;
    background: rgba(124, 92, 252, 0.15);
    color: #b4a9f6;
    border: 1px solid rgba(124, 92, 252, 0.25);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge.ai    { background: rgba(56, 189, 248, 0.13); color: #7dd3fc; border-color: rgba(56, 189, 248, 0.25); }
  .badge.oss   { background: rgba(74, 222, 128, 0.13); color: #86efac; border-color: rgba(74, 222, 128, 0.25); }
  .badge.web   { background: rgba(251, 146, 60, 0.13); color: #fdba74; border-color: rgba(251, 146, 60, 0.25); }

  .arrow {
    position: relative; z-index: 1;
    margin-left: auto;
    font-size: 22px; color: #505068;
    transition: var(--transition);
  }
  .project-card:hover .arrow { color: #a5b4fc; transform: translateX(5px); }

  /* ============ FOOTER / LINKS ============ */
  .socials {
    display: flex; justify-content: center; gap: 16px;
    padding: 20px;
    animation: fadeInUp 0.9s ease 0.3s both;
  }
  .social-dot {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: #808898;
    transition: var(--transition);
    cursor: pointer; text-decoration: none;
  }
  .social-dot:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 0 24px var(--accent-glow);
    transform: translateY(-4px);
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 600px) {
    .hero { padding: 32px 20px 28px; }
    .name { font-size: 28px; }
    .project-card { flex-direction: column; align-items: flex-start; gap: 14px; }
    .arrow { margin-left: 0; align-self: flex-end; margin-top: -40px; }
  }
</style>
</head>
<body>

<!-- animated background -->
<div class="bg-orbs"></div>
<div class="particles" id="particles"></div>

<main class="wrapper">

  <!-- HERO -->
  <section class="hero glass">
    <div class="avatar-ring">
      <div class="avatar">🐟</div>
    </div>
    <h1 class="name">xiaoy_ovo</h1>
    <p class="tagline">/ 睡 觉 选 手 /</p>
    <p class="bio">
      <span id="typing-text"></span><span class="cursor"></span>
    </p>
  </section>

  <!-- WORKS -->
  <section class="works glass">
    <span class="section-title">✦ Works</span>

    <a class="project-card" href="https://xiaoy-ovo.github.io/webide" target="_blank" rel="noopener">
      <div class="project-icon">💻</div>
      <div class="project-info">
        <span class="project-name">WebIDE</span>
        <p class="project-desc">浏览器里的全功能编辑器，AI 智能补全，写代码更丝滑。</p>
        <div class="badge-row">
          <span class="badge ai">🤖 AI 补全</span>
          <span class="badge oss">🌟 开源</span>
          <span class="badge web">🌐 网页即用</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
  </section>

  <!-- SOCIALS -->
  <div class="socials">
    <a class="social-dot" href="https://github.com/xiaoy-ovo" target="_blank" rel="noopener" title="GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
    <a class="social-dot" href="mailto:xiaoy_ovo@outlook.com" title="Email">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 4-10 8L2 4"/></svg>
    </a>
  </div>

</main>

<script>
  // ============ PARTICLES ============
  const container = document.getElementById('particles');
  for (let i = 0; i < 38; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 14) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 5) + 'px';
    container.appendChild(p);
  }

  // ============ TYPING ============
  (function typeLoop() {
    const el = document.getElementById('typing-text');
    const phrases = ['一个很懒的人 💤', '写写代码，睡睡觉 🛌', '偶尔勤奋一下 ⚡', '大部分时间在摸鱼 🎣'];
    let pi = 0, ci = 0, deleting = false;
    function tick() {
      const current = phrases[pi];
      if (!deleting) {
        el.textContent = current.slice(0, ci++);
        if (ci > current.length) { deleting = true; return setTimeout(tick, 2200); }
      } else {
        el.textContent = current.slice(0, ci--);
        if (ci < 0) { deleting = false; pi = (pi + 1) % phrases.length; ci = 0; return setTimeout(tick, 400); }
      }
      setTimeout(tick, deleting ? 35 : 70);
    }
    tick();
  })();

  // ============ PROJECT CARD MOUSE GLOW ============
  document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      card.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
  });
</script>

</body>
</html>
