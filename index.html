<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiaoy_ovo</title>
<style>
/* ============================================================
   iOS 26 LIQUID GLASS — PERSONAL PAGE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* iOS 26 palette */
  --bg-deep: #0b0b14;
  --liquid-bg: rgba(255,255,255,0.055);
  --liquid-bg-strong: rgba(255,255,255,0.085);
  --liquid-border: rgba(255,255,255,0.10);
  --liquid-border-bright: rgba(255,255,255,0.18);
  --liquid-highlight: rgba(255,255,255,0.06);
  --text-0: #ffffff;
  --text-1: #e8e8f0;
  --text-2: #b0b0c8;
  --text-3: #787890;
  --accent: #6c5ce7;
  --accent2: #38bdf8;
  --accent3: #f472b6;
  --accent4: #34d399;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.25);
  --shadow-md: 0 8px 40px rgba(0,0,0,0.35);
  --shadow-lg: 0 24px 80px rgba(0,0,0,0.5);
  --radius-sm: 18px;
  --radius-md: 28px;
  --radius-lg: 36px;
  --spring: cubic-bezier(0.22, 0.88, 0.32, 1.12);
  --spring-soft: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-ios: cubic-bezier(0.25, 0.1, 0.25, 1);
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--bg-deep);
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Inter', 'Segoe UI', system-ui, sans-serif;
  color: var(--text-1);
  display: flex; align-items: center; justify-content: center;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  cursor: default;
  /* 全局微妙的纹理 */
  background-image:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(108,92,231,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 70% 70%, rgba(56,189,248,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 90%, rgba(244,114,182,0.06) 0%, transparent 55%);
}

/* ============================================================
   BACKGROUND LAYER — DYNAMIC ORBS (iOS 26 style)
   ============================================================ */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px);
  opacity: 0.55;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
  animation-direction: alternate;
}
.orb-1 {
  width: 55vmax; height: 55vmax;
  background: radial-gradient(circle at 35% 35%, rgba(108,92,231,0.7) 0%, rgba(108,92,231,0) 65%);
  top: -20%; left: -15%;
  animation-name: orb1; animation-duration: 16s;
}
.orb-2 {
  width: 45vmax; height: 45vmax;
  background: radial-gradient(circle at 50% 50%, rgba(56,189,248,0.55) 0%, rgba(56,189,248,0) 65%);
  bottom: -22%; right: -10%;
  animation-name: orb2; animation-duration: 18s; animation-delay: -8s;
}
.orb-3 {
  width: 35vmax; height: 35vmax;
  background: radial-gradient(circle at 60% 40%, rgba(244,114,182,0.4) 0%, rgba(244,114,182,0) 65%);
  top: 50%; left: 55%;
  animation-name: orb3; animation-duration: 14s; animation-delay: -4s;
}
.orb-4 {
  width: 30vmax; height: 30vmax;
  background: radial-gradient(circle at 40% 60%, rgba(52,211,153,0.3) 0%, rgba(52,211,153,0) 65%);
  top: 10%; right: 20%;
  animation-name: orb4; animation-duration: 20s; animation-delay: -12s;
}

@keyframes orb1 {
  0% { transform: translate(0,0) scale(1) rotate(0deg); }
  33% { transform: translate(8vmax, -5vmax) scale(1.08) rotate(2deg); }
  66% { transform: translate(-3vmax, 6vmax) scale(0.94) rotate(-1deg); }
  100% { transform: translate(4vmax, -2vmax) scale(1.03) rotate(1deg); }
}
@keyframes orb2 {
  0% { transform: translate(0,0) scale(1) rotate(0deg); }
  33% { transform: translate(-5vmax, -7vmax) scale(1.12) rotate(-2deg); }
  66% { transform: translate(6vmax, 3vmax) scale(0.90) rotate(1deg); }
  100% { transform: translate(2vmax, -4vmax) scale(1.06) rotate(-0.5deg); }
}
@keyframes orb3 {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-7vmax, 5vmax) scale(1.15); }
  100% { transform: translate(3vmax, -3vmax) scale(0.95); }
}
@keyframes orb4 {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(5vmax, -6vmax) scale(1.1); }
  100% { transform: translate(-4vmax, 2vmax) scale(0.92); }
}

/* ============================================================
   FLOATING PARTICLES WITH DEPTH
   ============================================================ */
.particle-layer {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  animation: float linear infinite;
  will-change: transform, opacity;
}
.particle:nth-child(odd) {
  background: rgba(200,210,255,0.45);
  box-shadow: 0 0 6px rgba(180,190,255,0.3);
}
.particle:nth-child(3n) {
  background: rgba(180,220,255,0.4);
  box-shadow: 0 0 8px rgba(150,200,255,0.25);
}
@keyframes float {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  5%   { opacity: 0.8; }
  85%  { opacity: 0.5; }
  100% { transform: translateY(-115vh) translateX(60px) scale(0.2); opacity: 0; }
}

/* ============================================================
   GRID LINES — subtle tech feel
   ============================================================ */
.grid-overlay {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.025;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 70%);
}

/* ============================================================
   MOUSE GLOW — follows cursor
   ============================================================ */
.cursor-glow {
  position: fixed; z-index: 0; pointer-events: none;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108,92,231,0.07) 0%, transparent 60%);
  transform: translate(-50%, -50%);
  transition: opacity 0.8s;
  opacity: 0;
}
.cursor-glow.active { opacity: 1; }

/* ============================================================
   MAIN CONTAINER
   ============================================================ */
.main {
  position: relative; z-index: 1;
  width: min(700px, 93vw);
  display: flex; flex-direction: column; gap: 24px;
  padding: 16px 0 48px;
}

/* ============================================================
   LIQUID GLASS CARD — THE CORE
   ============================================================ */
.glass {
  position: relative;
  background: var(--liquid-bg);
  border: 1px solid var(--liquid-border);
  border-radius: var(--radius-md);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -1px 0 rgba(0,0,0,0.1);
  transition: all 0.5s var(--ease-ios);
  overflow: hidden;
}

/* 液态玻璃高光边缘 */
.glass::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  border-radius: inherit;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.06) 0%,
    rgba(255,255,255,0.02) 30%,
    rgba(255,255,255,0) 50%,
    rgba(255,255,255,0.03) 70%,
    rgba(255,255,255,0.06) 100%
  );
  pointer-events: none;
}

/* 底部反光 */
.glass::after {
  content: '';
  position: absolute; bottom: 0; left: 10%; right: 10%; height: 1px; z-index: 1;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  pointer-events: none;
}

.glass > * { position: relative; z-index: 2; }

/* hover 增强 */
.glass.interactive:hover {
  border-color: var(--liquid-border-bright);
  box-shadow:
    0 16px 48px rgba(0,0,0,0.3),
    0 0 0 1px rgba(255,255,255,0.05),
    inset 0 1px 0 rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  padding: 48px 36px 40px;
  animation: cardIn 0.9s var(--spring-soft) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- Avatar --- */
.avatar-wrap {
  position: relative;
  width: 120px; height: 120px;
}
/* 旋转光环 */
.avatar-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    #6c5ce7, #38bdf8, #a78bfa, #f472b6, #6c5ce7
  );
  animation: ringSpin 7s linear infinite;
  filter: blur(2px);
  opacity: 0.9;
}
.avatar-ring::after {
  content: '';
  position: absolute; inset: 3px; border-radius: 50%;
  background: var(--bg-deep);
}
@keyframes ringSpin { to { transform: rotate(360deg); } }

.avatar-inner {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  border-radius: 50%;
  background: linear-gradient(145deg, #1e1e38, #141428);
  display: flex; align-items: center; justify-content: center;
  font-size: 50px;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.06),
    0 8px 32px rgba(0,0,0,0.4),
    0 0 60px rgba(108,92,231,0.25);
  user-select: none;
  transition: transform 0.6s var(--spring-soft);
}
.avatar-wrap:hover .avatar-inner {
  transform: scale(1.06);
}

/* status dot */
.status-dot {
  position: absolute; bottom: 6px; right: 6px; z-index: 3;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #34d399;
  border: 3px solid var(--bg-deep);
  box-shadow: 0 0 12px rgba(52,211,153,0.6);
  animation: pulse-dot 2.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 8px rgba(52,211,153,0.5); }
  50%      { box-shadow: 0 0 20px rgba(52,211,153,0.9), 0 0 40px rgba(52,211,153,0.3); }
}

/* --- Name --- */
.name {
  font-size: 38px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(160deg, #f0f0ff 0%, #c4b5fd 30%, #7dd3fc 60%, #e0e7ff 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: nameShimmer 4s ease-in-out infinite;
}
@keyframes nameShimmer {
  0%, 100% { background-position: 0% 50%; filter: brightness(1); }
  50%      { background-position: 100% 50%; filter: brightness(1.2); }
}

.tagline {
  font-size: 16px; font-weight: 500;
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--text-3);
  opacity: 0.8;
}

/* --- Typing Bio --- */
.bio-line {
  margin-top: 2px;
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; color: var(--text-2);
  min-height: 22px;
}
.bio-cursor {
  display: inline-block;
  width: 2.5px; height: 19px;
  background: var(--accent);
  border-radius: 2px;
  animation: cursorBlink 0.7s step-end infinite;
  box-shadow: 0 0 8px rgba(108,92,231,0.6);
}
@keyframes cursorBlink { 50% { opacity: 0; } }

/* --- Stats Row --- */
.stats-row {
  display: flex; gap: 28px; margin-top: 8px;
}
.stat-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.stat-num {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, #c4b5fd, #7dd3fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--text-3);
}

/* ============================================================
   WORKS SECTION
   ============================================================ */
.works-section {
  padding: 28px 30px;
  animation: cardIn 0.9s var(--spring-soft) 0.12s both;
}

.section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 22px;
}
.section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 10px rgba(56,189,248,0.7);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.6); opacity: 1; }
}
.section-label {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 5px;
  color: var(--text-3);
}

/* Project Cards */
.project-list {
  display: flex; flex-direction: column; gap: 14px;
}

.project-card {
  display: flex; align-items: center; gap: 18px;
  padding: 20px 22px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.07);
  text-decoration: none; color: inherit;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.45s var(--spring);
  animation: cardIn 0.7s var(--spring-soft) calc(0.2s + var(--i, 0) * 0.08s) both;
}
.project-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%),
              rgba(108,92,231,0.1), transparent 60%);
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none; z-index: 0;
}
.project-card:hover::before { opacity: 1; }
.project-card:hover {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 80px rgba(108,92,231,0.08);
  transform: translateY(-3px) scale(1.015);
}
.project-card:active {
  transform: translateY(-1px) scale(0.99);
  transition: all 0.1s var(--ease-ios);
}

.project-icon {
  flex-shrink: 0; z-index: 1;
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(56,189,248,0.15));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: all 0.4s var(--ease-ios);
}
.project-card:hover .project-icon {
  box-shadow: 0 4px 24px rgba(108,92,231,0.25);
  transform: scale(1.05);
}

.project-info { z-index: 1; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.project-name {
  font-size: 19px; font-weight: 700;
  background: linear-gradient(135deg, #e8e8f5, #b0b8d0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.project-desc { font-size: 13.5px; color: var(--text-3); line-height: 1.5; }

.badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 3px; }
.badge {
  font-size: 10.5px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  letter-spacing: 0.4px;
  white-space: nowrap;
}
.badge.purple { background: rgba(108,92,231,0.15); color: #c4b5fd; border: 1px solid rgba(108,92,231,0.2); }
.badge.blue   { background: rgba(56,189,248,0.12); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.2); }
.badge.green  { background: rgba(52,211,153,0.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.2); }
.badge.orange { background: rgba(244,114,182,0.12); color: #f9a8d4; border: 1px solid rgba(244,114,182,0.2); }

.arrow-icon {
  z-index: 1; flex-shrink: 0;
  font-size: 20px; color: var(--text-3);
  transition: all 0.4s var(--spring);
}
.project-card:hover .arrow-icon {
  color: var(--accent2);
  transform: translateX(6px);
}

/* --- WORKS LINK BUTTON (iOS 26 style) --- */
.works-link-wrap {
  margin-top: 18px;
  text-align: center;
}
.works-link {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 32px;
  border-radius: 100px;
  background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(56,189,248,0.15));
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-1);
  font-size: 15px; font-weight: 600;
  letter-spacing: 1px;
  text-decoration: none;
  cursor: pointer;
  position: relative; overflow: hidden;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all 0.5s var(--spring);
  box-shadow: 0 4px 20px rgba(108,92,231,0.12);
}
.works-link::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 60%);
  pointer-events: none;
  transition: opacity 0.4s;
}
.works-link::after {
  content: '';
  position: absolute; inset: -2px;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(108,92,231,0.5), rgba(56,189,248,0.4), rgba(244,114,182,0.3));
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s;
  filter: blur(12px);
}
.works-link:hover {
  transform: translateY(-3px) scale(1.03);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 12px 40px rgba(108,92,231,0.3), 0 0 80px rgba(56,189,248,0.2);
}
.works-link:hover::after { opacity: 0.7; }
.works-link:active {
  transform: translateY(0) scale(0.97);
  transition: all 0.12s var(--ease-ios);
}

.works-link-arrow {
  display: inline-block;
  font-size: 18px;
  transition: transform 0.4s var(--spring);
}
.works-link:hover .works-link-arrow {
  transform: translateX(4px);
}

.works-link-sparkle {
  position: absolute;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkle 1.2s ease-out forwards;
  opacity: 0;
}
@keyframes sparkle {
  0% { transform: translate(0,0) scale(0); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(1.2); opacity: 0; }
}

/* ============================================================
   SOCIALS
   ============================================================ */
.socials {
  display: flex; justify-content: center; gap: 14px;
  padding: 8px 0;
  animation: cardIn 0.9s var(--spring-soft) 0.24s both;
}
.social-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--liquid-bg);
  border: 1px solid var(--liquid-border);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.45s var(--spring);
  position: relative; overflow: hidden;
}
.social-btn::after {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: radial-gradient(circle at 50% 50%, rgba(108,92,231,0.3), transparent);
  opacity: 0; transition: opacity 0.4s;
}
.social-btn:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.28);
  box-shadow: 0 8px 28px rgba(108,92,231,0.3), 0 0 40px rgba(108,92,231,0.12);
  transform: translateY(-5px) scale(1.08);
}
.social-btn:hover::after { opacity: 1; }
.social-btn:active {
  transform: translateY(0) scale(0.94);
  transition: all 0.1s var(--ease-ios);
}

/* ============================================================
   FOOTER
   ============================================================ */
.footer {
  text-align: center;
  font-size: 12px; color: var(--text-3);
  letter-spacing: 2px;
  opacity: 0.5;
  animation: cardIn 0.9s var(--spring-soft) 0.3s both;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  .hero { padding: 36px 20px 30px; }
  .name { font-size: 30px; }
  .works-section { padding: 22px 18px; }
  .project-card { flex-direction: column; align-items: flex-start; gap: 12px; padding: 18px; }
  .arrow-icon { position: absolute; right: 18px; top: 18px; }
  .stats-row { gap: 20px; }
}

/* ============================================================
   SCROLLBAR (subtle)
   ============================================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 20px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

/* ============================================================
   SELECTION
   ============================================================ */
::selection {
  background: rgba(108,92,231,0.35);
  color: #fff;
}
</style>
</head>
<body>

<!-- BACKGROUND EFFECTS -->
<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="grid-overlay"></div>
<div class="particle-layer" id="particleLayer"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- HERO -->
  <section class="hero glass">

<script>
// ============================================================
// iOS 26 LIQUID GLASS — PERSONAL PAGE SCRIPTS
// ============================================================

// --- PARTICLES ---
(function spawnParticles() {
  const layer = document.getElementById('particleLayer');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (60 + Math.random() * 40) + '%';
    p.style.width = p.style.height = (1.5 + Math.random() * 5.5) + 'px';
    p.style.animationDuration = (7 + Math.random() * 18) + 's';
    p.style.animationDelay = Math.random() * 14 + 's';
    p.style.opacity = (0.15 + Math.random() * 0.5);
    frag.appendChild(p);
  }
  layer.appendChild(frag);
})();

// --- CURSOR GLOW ---
(function cursorGlow() {
  const glow = document.getElementById('cursorGlow');
  let active = false;
  const onMove = (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
    if (!active) { glow.classList.add('active'); active = true; }
  };
  const onLeave = () => { glow.classList.remove('active'); active = false; };
  document.addEventListener('mousemove', onMove, { passive: true });
  document.addEventListener('mouseleave', onLeave);
})();

// --- PROJECT CARD LIGHT TRACKING ---
(function cardGlow() {
  document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      card.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
  });
})();

// --- WORKS BUTTON SPARKLES ---
(function worksSparkles() {
  const btn = document.getElementById('worksBtn');
  if (!btn) return;
  btn.addEventListener('mousemove', (e) => {
    const r = btn.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;
    const sparkle = document.createElement('div');
    sparkle.className = 'works-link-sparkle';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.setProperty('--sx', (Math.random() - 0.5) * 60 + 'px');
    sparkle.style.setProperty('--sy', (Math.random() - 0.5) * 60 + 'px');
    btn.appendChild(sparkle);
    sparkle.addEventListener('animationend', () => sparkle.remove());
  });
})();

// --- TYPING ANIMATION (multi-phrase loop) ---
(function typeLoop() {
  const el = document.getElementById('typingOutput');
  if (!el) return;
  const phrases = [
    '一个很懒的人',
    '开源即是信仰',
    '偶尔勤奋写代码',
    '大部分时间在睡觉',
    '永远热爱开源',
  ];
  let pi = 0, ci = 0, deleting = false;
  function tick() {
    const current = phrases[pi];
    if (!deleting) {
      el.textContent = current.slice(0, ci++);
      if (ci > current.length) { deleting = true; return setTimeout(tick, 2400); }
    } else {
      el.textContent = current.slice(0, ci--);
      if (ci < 0) { deleting = false; pi = (pi + 1) % phrases.length; ci = 0; return setTimeout(tick, 380); }
    }
    setTimeout(tick, deleting ? 30 : 65);
  }
  tick();
})();

// --- COUNT-UP ANIMATION (Intersection Observer) ---
(function countUp() {
  const nums = document.querySelectorAll('.stat-num[data-count]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const target = el.getAttribute('data-count');
      if (target === '∞') { el.textContent = '∞'; return; }
      const targetNum = parseInt(target, 10);
      const duration = 1400;
      const start = performance.now();
      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        // ease-out
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(eased * targetNum);
        if (progress < 1) requestAnimationFrame(update);
        else el.textContent = target;
      }
      requestAnimationFrame(update);
      observer.unobserve(el);
    });
  }, { threshold: 0.6 });
  nums.forEach(n => observer.observe(n));
})();

// --- PARALLAX ON ORBS (tilt effect) ---
(function parallaxOrbs() {
  const orbs = document.querySelectorAll('.orb');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 2;
    const y = (e.clientY / window.innerHeight - 0.5) * 2;
    orbs.forEach((orb, i) => {
      const depth = (i + 1) * 8;
      orb.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
    });
  }, { passive: true });
})();

// --- RANDOM SUBTLE CARD SHIMMER ---
(function cardShimmer() {
  const cards = document.querySelectorAll('.glass');
  const animate = () => {
    cards.forEach((card, i) => {
      const delay = i * 0.7;
      const intensity = 0.008 + Math.sin(Date.now() / 3000 + delay) * 0.004;
      card.style.boxShadow = `
        0 8px 32px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,${0.05 + intensity}),
        inset 0 -1px 0 rgba(0,0,0,0.1)
      `;
    });
    requestAnimationFrame(() => requestAnimationFrame(animate));
  };
  requestAnimationFrame(animate);
})();

// --- SMOOTH SPRING-LIKE HOVER FOR ALL INTERACTIVE ELEMENTS ---
// The CSS handles most of it, but we can add micro-interactions
(function microInteractions() {
  // Ripple effect on glass cards
  document.querySelectorAll('.glass.interactive').forEach(card => {
    card.addEventListener('click', function(e) {
      // skip if clicking a link
      if (e.target.closest('a')) return;
      const ripple = document.createElement('div');
      const r = this.getBoundingClientRect();
      const size = Math.max(r.width, r.height);
      ripple.style.cssText = `
        position: absolute; z-index: 0;
        width: ${size}px; height: ${size}px;
        left: ${e.clientX - r.left - size/2}px;
        top: ${e.clientY - r.top - size/2}px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
        pointer-events: none;
        animation: rippleOut 0.8s ease-out forwards;
      `;
      this.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });
  });
  // Inject ripple keyframe dynamically
  const style = document.createElement('style');
  style.textContent = '@keyframes rippleOut { to { transform: scale(2); opacity: 0; } }';
  document.head.appendChild(style);
})();

console.log('xiaoy_ovo - Open Source - Keep It Simple');
console.log('Built with liquid glass');
</script>
